<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meditate</title>
    <link rel="stylesheet" href="/daily-breath.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="logo"><i class="fa-solid fa-hand-holding-heart"></i> Luvina</div>
            <nav class="side-nav">
                <a href="/home.html"><i class="fa-solid fa-house"></i> Home</a>
                <a href="/daily-breath.html" class="active"><i class="fa-solid fa-hands-praying"></i> Meditate</a>
                <a href="/page3.html"><i class="fa-solid fa-book-open"></i> Journal</a>
                <a href="/Inhale.html"><i class="fa-solid fa-leaf"></i></i>Vibe</a>
            </nav>
        </aside>
        <div class="main-container">
            <header class="app-header">
                <h1 class="app-title">Daily Breath</h1>
                <div class="profile-pic">
                </div>
            </header>
    
            <main class="meditation-area">
                <div class="meditation-content">
                    <div class="breathing-circle">
                        <h2 class="inhale-text">Inhale...</h2>
                    </div>
                    <div class="timer-tag">
                        <p>4 minutes remaining</p>
                    </div>
                </div>
            </main>

            <footer class="app-footer">
                <div class="control-icons-group">
                    <div class="icon-btn settings-icon"><i class="fa-solid fa-gear"></i></div>
    
                    <button class="play-pause-btn">
                        <i class="fa-solid fa-pause"></i>
                    </button>
    
                    <div class="icon-btn volume-icon"><i class="fa-solid fa-volume-high"></i></div>
                </div>
    
                <button class="end-session-btn">End Session</button>
            </footer>
        </div>
    </div>
</body>

</html>
