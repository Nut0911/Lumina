<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Breath - Desktop Version</title>
    <link rel="stylesheet" href="daily-breath.css">
</head>
<body>
    <div class="desktop-container">
        
        <header class="app-header">
            <button class="icon-btn back-arrow">←</button>
            <h1 class="app-title">Daily Breath</h1>
            <div class="profile-pic">
                <img src="https://i.pravatar.cc/100" alt="profile picture">
            </div>
        </header>

        <main class="meditation-area">
            <div class="meditation-content">
                <div class="breathing-circle">
                    <h2 class="inhale-text">Inhale...</h2>
                </div>
                <div class="timer-tag">
                    <p>4 minutes remaining</p>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <div class="control-icons-group">
                <button class="icon-btn settings-icon">⚙️</button>
                
                <button class="play-pause-btn">
                    Ⅱ
                </button>
                
                <button class="icon-btn volume-icon">🔊</button>
            </div>
            
            <button class="end-session-btn">End Session</button>
        </footer>
    </div>
</body>
</html>
