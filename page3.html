<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Serene</title>
  <link rel="stylesheet" href="page3.css">

  <!-- icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">
      <span>
        Lumina
      </span>
    </div>
    <img src="" class"avatar">
  </div>

  <!-- MAIN -->
  <div class="layout">

    <!-- LEFT -->
    <div class="left">
      <h1>What’s on your mind today?</h1>
      <p>Take a deep breath and let your thoughts flow onto the canvas. This is your private sanctuary.</p>

      <textarea placeholder="Start typing your reflection..."></textarea>
    </div>

    <!-- RIGHT -->
    <div class="right">

      <div class="card">
        <div class="row">
          <i class="fa-solid fa-lock"></i>
          <div>
            <h3>Private Entry</h3>
            <p>Only you can view this</p>
          </div>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <i class="fa-regular fa-calendar"></i>
          <div>
            <h3>September 12, 2025</h3>
            <p>4:30 PM • Sunset Session</p>
          </div>
        </div>
      </div>

      <button class="save-btn">Save</button>

    </div>

  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <div><i class="fa-solid fa-house"></i><p>Home</p></div>
    <div><i class="fa-solid fa-spa"></i><p>Meditate</p></div>
    <div><i class="fa-solid fa-pen"></i><p>Journal</p></div>
    <div><i class="fa-solid fa-user"></i><p>Profile</p></div>
  </div>

</div>

</body>
</html>
